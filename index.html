<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar System Simulation</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #000;
      }

      /* Fullscreen background overlay */
      #loading-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        font-family: sans-serif;
      }

      label {
        color: white;
        font-size: 2em;
        margin-bottom: 20px;
      }

      /* Style the loading progress bar bar */
      progress {
        width: 30%;
        height: 20px;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <label for="progress-bar">Loading Space Assets...</label>
      <progress id="progress-bar" value="0" max="100"></progress>
    </div>
    
    <script type="module" src="src/main.js"></script>
  </body>
</html>
